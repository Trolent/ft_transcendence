services:
  frontend:
    container_name: frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - transcendence
    restart: always
    env_file:
      - .env

  backend:
    container_name: backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - transcendence
    restart: always
    env_file:
      - .env
    

  postgresql:
    container_name: postgresql
    build: 
      context: ./postgresql
      dockerfile: Dockerfile
    ports: 
      - "5432:5432"
    volumes: 
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - transcendence
    restart: always
    env_file:
      - .env
    
#volumes:
